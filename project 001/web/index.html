<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaLog</title>
<style>
/* ───────────────────────────────────────────────
   TOKENS — edit here, cascade everywhere
─────────────────────────────────────────────── */
:root {
  --bg:      #0a0a0f;
  --bg2:     #111118;
  --bg3:     #18181f;
  --bg4:     #202028;
  --border:  #2a2a38;
  --border2: #3a3a4a;

  --fg:      #e4e4f0;
  --fg2:     #aaaacc;
  --fg3:     #666688;

  --accent:  #c4b5fd;     /* lavender */
  --accent2: #7c3aed;

  /* Type colors */
  --c-movie: #f87171;   /* rose */
  --c-book:  #38bdf8;   /* sky  */
  --c-tv:    #a78bfa;   /* violet */
  --c-album: #34d399;   /* emerald */
  --c-game:  #fb923c;   /* orange */

  /* Status colors */
  --s-completed: #4ade80;
  --s-watching:  #facc15;
  --s-want:      #94a3b8;
  --s-dropped:   #f87171;

  --nav-h:   56px;
  --radius:  4px;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  --font-sans: 'DM Sans', 'Helvetica Neue', sans-serif;
  --ease:    cubic-bezier(.22,.68,0,1.2);
}

/* ───────────────────────────────────────────────
   RESET + BASE
─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

button { cursor: pointer; border: none; background: none; font: inherit; }
input, select, textarea { font: inherit; }
input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ───────────────────────────────────────────────
   LOADING SCREEN
─────────────────────────────────────────────── */
#loading {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 999;
  transition: opacity .4s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.loading-glyph {
  font-size: 40px;
  color: var(--accent);
  animation: spin 2s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .15em;
  color: var(--fg3);
}

/* ───────────────────────────────────────────────
   NAV
─────────────────────────────────────────────── */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(10,10,15,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 24px;
  flex-shrink: 0;
}
.brand-glyph {
  font-size: 18px;
  color: var(--accent);
}
.brand-text {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .18em;
  color: var(--fg);
}

.nav-center {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-center::-webkit-scrollbar { display: none; }

.tab {
  padding: 6px 14px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .12em;
  color: var(--fg3);
  transition: color .15s, background .15s;
  white-space: nowrap;
}
.tab:hover { color: var(--fg2); background: var(--bg3); }
.tab-active {
  color: var(--accent);
  background: rgba(196,181,253,.08);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 16px;
  flex-shrink: 0;
}

.nav-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .12em;
  color: var(--fg3);
  transition: all .15s;
}
.nav-btn:hover { color: var(--fg); border-color: var(--border2); }

.nav-add {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
}
.nav-add:hover { background: #6d28d9; border-color: #6d28d9; color: #fff; }

/* ───────────────────────────────────────────────
   SEARCH
─────────────────────────────────────────────── */
.search-bar {
  padding: 16px 20px 0;
  max-width: 600px;
}
.search-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 14px;
  color: var(--fg);
  font-size: 13px;
  transition: border-color .15s;
}
.search-input::placeholder { color: var(--fg3); }
.search-input:focus { border-color: var(--accent); outline: none; }

/* ───────────────────────────────────────────────
   MAIN LAYOUT
─────────────────────────────────────────────── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 20px 60px;
}

.list-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  color: var(--fg3);
  margin-bottom: 16px;
}

/* ───────────────────────────────────────────────
   CARD GRID
─────────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.card {
  position: relative;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  cursor: pointer;
  transition: border-color .18s, transform .18s var(--ease), background .18s;
  animation: fade-in .25s ease both;
}
@keyframes fade-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
.card:hover {
  background: var(--bg3);
  border-color: var(--border2);
  transform: translateY(-2px);
}

/* Accent left border by type */
.type-card-movie  { border-left: 3px solid var(--c-movie); }
.type-card-book   { border-left: 3px solid var(--c-book); }
.type-card-tv     { border-left: 3px solid var(--c-tv); }
.type-card-album  { border-left: 3px solid var(--c-album); }
.type-card-game   { border-left: 3px solid var(--c-game); }

.card-glyph {
  font-size: 22px;
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg4);
  border-radius: 50%;
}

.card-body { flex: 1; min-width: 0; }

.card-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 6px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}

.card-year {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg3);
}

.card-stars {
  font-size: 11px;
  color: var(--accent);
  letter-spacing: .05em;
}

.fav-mark {
  font-size: 11px;
  color: #f472b6;
}

.card-del {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 11px;
  color: var(--fg3);
  padding: 3px 6px;
  border-radius: var(--radius);
  transition: color .15s, background .15s;
  opacity: 0;
}
.card:hover .card-del { opacity: 1; }
.card-del:hover { color: #f87171; background: rgba(248,113,113,.12); }

/* ───────────────────────────────────────────────
   BADGES
─────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 2px;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.badge-completed { background: rgba(74,222,128,.12); color: var(--s-completed); }
.badge-watching  { background: rgba(250,204,21,.10); color: var(--s-watching); }
.badge-want      { background: rgba(148,163,184,.10); color: var(--s-want); }
.badge-dropped   { background: rgba(248,113,113,.12); color: var(--s-dropped); }

/* ───────────────────────────────────────────────
   EMPTY STATE
─────────────────────────────────────────────── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 12px;
  text-align: center;
}
.empty-glyph {
  font-size: 48px;
  color: var(--border2);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: .5; }
  50%      { opacity: 1; }
}
.empty-msg  { font-size: 16px; font-weight: 600; color: var(--fg2); }
.empty-sub  { font-size: 13px; color: var(--fg3); }

/* ───────────────────────────────────────────────
   ADD FORM
─────────────────────────────────────────────── */
.form-wrap {
  max-width: 640px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  animation: fade-in .2s ease;
}

.form-head {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .2em;
  color: var(--accent);
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.form-section {
  margin-bottom: 20px;
}
.form-section-fav {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-label {
  display: block;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .15em;
  color: var(--fg3);
  margin-bottom: 8px;
}

.f-in {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  color: var(--fg);
  font-size: 13px;
  transition: border-color .15s;
  -webkit-appearance: none;
}
.f-in::placeholder { color: var(--fg3); }
.f-in:focus { border-color: var(--accent); outline: none; }

select.f-in { cursor: pointer; }
select.f-in option { background: var(--bg3); }

.f-area {
  resize: vertical;
  min-height: 80px;
  max-height: 200px;
}

/* Type buttons */
.type-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.type-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  color: var(--fg3);
  transition: all .15s;
}
.type-btn:hover { border-color: var(--border2); color: var(--fg); }
.type-btn-active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(196,181,253,.08);
}
.type-btn-ico { font-size: 14px; }

/* Toggle switch */
.toggle {
  display: inline-flex;
  align-items: center;
  cursor: pointer;
}
.toggle input { display: none; }
.toggle-slider {
  width: 40px;
  height: 22px;
  background: var(--bg4);
  border: 1px solid var(--border);
  border-radius: 11px;
  position: relative;
  transition: background .2s, border-color .2s;
}
.toggle-slider::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--fg3);
  transition: transform .2s var(--ease), background .2s;
}
.toggle input:checked + .toggle-slider { background: var(--accent2); border-color: var(--accent2); }
.toggle input:checked + .toggle-slider::after { transform: translateX(18px); background: #fff; }

/* Form actions */
.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.btn-ghost {
  padding: 9px 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--fg3);
  transition: all .15s;
}
.btn-ghost:hover { border-color: var(--border2); color: var(--fg); }

.btn-submit {
  padding: 9px 24px;
  background: var(--accent2);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  color: #fff;
  transition: background .15s, transform .12s;
}
.btn-submit:hover { background: #5b21b6; }
.btn-submit:active { transform: scale(.97); }

/* ───────────────────────────────────────────────
   DETAIL VIEW
─────────────────────────────────────────────── */
.detail-wrap {
  max-width: 700px;
  animation: fade-in .2s ease;
}

.detail-header {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.detail-glyph {
  font-size: 36px;
  width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg3);
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid var(--border);
}

/* Type-colored ring on detail icon */
.type-detail-movie  .detail-glyph { border-color: var(--c-movie); }
.type-detail-book   .detail-glyph { border-color: var(--c-book); }
.type-detail-tv     .detail-glyph { border-color: var(--c-tv); }
.type-detail-album  .detail-glyph { border-color: var(--c-album); }
.type-detail-game   .detail-glyph { border-color: var(--c-game); }

.detail-type-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .18em;
  color: var(--fg3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.detail-title {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 4px;
}

.detail-year {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg3);
}

.detail-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
}

.pill {
  display: inline-flex;
  align-items: center;
  padding: 5px 12px;
  border-radius: 2px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--fg2);
}
.pill.badge-completed { background: rgba(74,222,128,.12); border-color: rgba(74,222,128,.2); color: var(--s-completed); }
.pill.badge-watching  { background: rgba(250,204,21,.10); border-color: rgba(250,204,21,.2); color: var(--s-watching); }
.pill.badge-want      { background: rgba(148,163,184,.10); border-color: rgba(148,163,184,.2); color: var(--s-want); }
.pill.badge-dropped   { background: rgba(248,113,113,.12); border-color: rgba(248,113,113,.2); color: var(--s-dropped); }
.pill-stars { color: var(--accent); border-color: rgba(196,181,253,.2); background: rgba(196,181,253,.06); }
.pill-fav   { color: #f472b6; border-color: rgba(244,114,182,.2); background: rgba(244,114,182,.06); }

.detail-block {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 14px;
}
.block-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .15em;
  color: var(--fg3);
  margin-bottom: 8px;
}
.block-text {
  color: var(--fg2);
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
}

.detail-actions {
  display: flex;
  gap: 12px;
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.btn-danger {
  padding: 9px 20px;
  background: rgba(248,113,113,.1);
  border: 1px solid rgba(248,113,113,.3);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  color: #f87171;
  transition: all .15s;
}
.btn-danger:hover { background: rgba(248,113,113,.2); }

/* ───────────────────────────────────────────────
   STATS VIEW
─────────────────────────────────────────────── */
.stats-wrap {
  max-width: 700px;
  animation: fade-in .2s ease;
}

.stats-head {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .2em;
  color: var(--accent);
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.stat-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
}
.stat-num {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 6px;
}
.stat-lbl {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: .15em;
  color: var(--fg3);
}

.stat-section {
  margin-bottom: 32px;
}
.stat-section-title {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .18em;
  color: var(--fg3);
  margin-bottom: 14px;
}

.bar-list { display: flex; flex-direction: column; gap: 10px; }
.bar-row {
  display: grid;
  grid-template-columns: 120px 1fr 36px;
  align-items: center;
  gap: 12px;
}
.bar-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg2);
  text-transform: capitalize;
}
.bar-track {
  height: 6px;
  background: var(--bg4);
  border-radius: 3px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--border2);
  transition: width .6s var(--ease);
}
.bar-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg3);
  text-align: right;
}

/* Type bar fills */
.type-fill-movie  { background: var(--c-movie); }
.type-fill-book   { background: var(--c-book); }
.type-fill-tv     { background: var(--c-tv); }
.type-fill-album  { background: var(--c-album); }
.type-fill-game   { background: var(--c-game); }

/* Status bar fills */
.badge-completed.bar-fill { background: var(--s-completed); }
.badge-watching.bar-fill  { background: var(--s-watching); }
.badge-want.bar-fill      { background: var(--s-want); }
.badge-dropped.bar-fill   { background: var(--s-dropped); }

.type-label-movie { color: var(--c-movie); }
.type-label-book  { color: var(--c-book); }
.type-label-tv    { color: var(--c-tv); }
.type-label-album { color: var(--c-album); }
.type-label-game  { color: var(--c-game); }

.top-list { display: flex; flex-direction: column; gap: 8px; }
.top-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
}
.top-glyph { font-size: 18px; flex-shrink: 0; }
.top-title { flex: 1; font-size: 13px; font-weight: 500; }
.top-stars { font-size: 12px; color: var(--accent); flex-shrink: 0; }

/* ───────────────────────────────────────────────
   SCROLLBAR
─────────────────────────────────────────────── */
::-webkit-scrollbar        { width: 6px; height: 6px; }
::-webkit-scrollbar-track  { background: transparent; }
::-webkit-scrollbar-thumb  { background: var(--border2); border-radius: 3px; }

/* ───────────────────────────────────────────────
   RESPONSIVE
─────────────────────────────────────────────── */
@media (max-width: 640px) {
  .nav-center { display: none; }
  .stat-cards { grid-template-columns: repeat(2,1fr); }
  .form-row   { grid-template-columns: 1fr; }
  .bar-row    { grid-template-columns: 90px 1fr 28px; }
}
</style>
</head>
<body>

<!-- Loading screen (hidden once WASM+sql.js are ready) -->
<div id="loading">
  <div class="loading-glyph">◈</div>
  <div class="loading-label">INITIALIZING MEDIALOG</div>
</div>

<!-- C renders everything into here -->
<div id="app"></div>

<!-- ─── sql.js (SQLite compiled to WASM) ─── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"
        crossorigin="anonymous"></script>

<!-- ─── JS ↔ C bridge ─── -->
<script>
/*
 * This is the only JavaScript in the project.
 * Its sole purpose is:
 *   1. Bootstrap Emscripten + sql.js
 *   2. Provide the C.* functions that HTML onclick attributes call,
 *      which forward to the exported C (WASM) functions.
 *
 * All application logic, state, and UI generation lives in app.c.
 */

/* Global add-type tracker (kept in sync with C state) */
let _addType = 'movie';

/* Convenience wrappers: allocate a UTF-8 C string, call fn, free */
function _cstr(s) {
    return Module.stringToNewUTF8(s || '');
}

/* Public API — called from inline onclick attributes generated by C */
const C = {

    nav(view, filter) {
        const vp = _cstr(view);
        const fp = _cstr(filter);
        Module._app_navigate(vp, fp);
        Module._free(vp);
        Module._free(fp);
    },

    detail(id) {
        Module._app_detail(id | 0);
    },

    del(id) {
        Module._app_delete(id | 0);
    },

    setType(t) {
        _addType = t;
        const p = _cstr(t);
        Module._app_set_type(p);
        Module._free(p);
    },

    search(q) {
        /* Debounce: wait 150 ms after typing stops */
        clearTimeout(C._searchTimer);
        C._searchTimer = setTimeout(() => {
            const p = _cstr(q);
            Module._app_search(p);
            Module._free(p);
        }, 150);
    },
    _searchTimer: null,

    submit() {
        const title  = (document.getElementById('ft')?.value || '').trim();
        if (!title) {
            document.getElementById('ft')?.focus();
            return;
        }
        const year   = parseInt(document.getElementById('fy')?.value) || 0;
        const status = document.getElementById('fs')?.value || 'want';
        const rating = parseFloat(document.getElementById('fr')?.value) || 0;
        const notes  = document.getElementById('fn')?.value || '';
        const fav    = document.getElementById('ff')?.checked ? 1 : 0;

        const tp = _cstr(title);
        const yp = _cstr(_addType);
        const sp = _cstr(status);
        const np = _cstr(notes);

        Module._app_submit(tp, yp, year, sp, rating, np, fav);

        Module._free(tp); Module._free(yp);
        Module._free(sp); Module._free(np);
    }
};

/* ─── Emscripten Module config ─── */
var Module = {
    /* Silence the default Emscripten print calls */
    print:    () => {},
    printErr: (s) => console.warn('[wasm]', s),

    onRuntimeInitialized() {
        /*
         * WASM runtime is up. Now initialise sql.js (also WASM),
         * then hand control to C via app_init().
         */
        initSqlJs({
            locateFile: (f) =>
                `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`
        }).then(SQL => {
            Module._SQL = SQL;          /* C's js_init_db() reads this  */
            Module._app_init();         /* → js_init_db() → app_start() */

            /* Hide loading screen */
            const el = document.getElementById('loading');
            if (el) el.classList.add('hidden');
        }).catch(err => {
            console.error('sql.js failed to load:', err);
            document.getElementById('loading').textContent =
                'Error: failed to load database engine. Check console.';
        });
    }
};
</script>

<!-- ─── The Emscripten-generated WASM loader (built from app.c) ─── -->
<script src="app.js"></script>

</body>
</html>
